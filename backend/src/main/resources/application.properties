spring.application.name=backend
server.servlet.context-path=/api/v1

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.hikari.auto-commit=true

# PayMongo Sandbox - SDD section 3.2 (credentials in environment variables only)
paymongo.secret-key=${PAYMONGO_SECRET_KEY}
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET}
paymongo.success-url=${PAYMONGO_SUCCESS_URL}
paymongo.cancel-url=${PAYMONGO_CANCEL_URL}

# SMTP Email - SDD section 2.4 (JavaMailSender via Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
dentalink.mail.from=${MAIL_FROM:noreply@dentalink.com}